<!DOCTYPE html>
<html lang="hi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>

        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; background: #121212; color: #fff; font-family: sans-serif; overflow: hidden; }

        #project-bar { display: flex; gap: 4px; padding: 6px; background: #222; align-items: center; }

        #projectSelect, #modelSelect { flex: 1; min-width: 60px; font-size: 10px; background: #333; color: white; border: 1px solid #555; height: 30px; border-radius: 3px; }

        .p-btn { padding: 0 6px; font-size: 10px; height: 30px; background: #0076a3; color: white; border: none; border-radius: 3px; font-weight: bold; cursor: pointer; }

        #toolbar { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 6px; background: #1a1a1a; max-height: 250px; overflow-y: auto; border-bottom: 1px solid #333; }

        .t-btn { height: 35px; font-size: 10px; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        #preview-container { height: 20vh; background: #fff; position: relative; }

        #preview { width: 100%; height: 100%; border: none; }

        #editor { flex: 1; width: 100%; padding: 10px; background: #1e1e1e; color: #00ff00; border: none; font-family: monospace; resize: none; overflow-y: auto; }

        .fullscreen-active { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh !important; z-index: 9999; }

        #close-fs-btn { display: none; position: absolute; top: 10px; right: 10px; z-index: 10000; padding: 8px 15px; background: #c0392b; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }

    </style>

</head>

<body>
<div id="project-bar">

        <select id="projectSelect" onchange="loadProject()"><option value="">- प्रोजेक्ट -</option></select>

        <select id="modelSelect">

            <option value="gemini-3.5-flash">Flash (3.5)</option>

            <option value="gemini-3.1-pro-preview">Pro (3.1)</option>

        </select>

        <button class="p-btn" onclick="toggleThinking()" id="thinkingBtn">🧠 Thinking: OFF</button>

        <button class="p-btn" onclick="saveProject()">💾 सेव</button>

    </div>
<div id="toolbar">

        <button class="t-btn" onclick="document.getElementById('fileInput').click()" style="background:#e67e22">📁 फाइलें</button>

        <button class="t-btn" onclick="startStreamingCode()" style="background:#27ae60">🚀 स्ट्रीम कोड</button>

        <button class="t-btn" onclick="aiAnalyze()" style="background:#9b59b6">🤖 AI Analyze</button>

        <button class="t-btn" onclick="document.getElementById('gemini-overlay').style.display='flex'" style="background:#4285f4">🎙️ Gemini Voice</button>

        <button class="t-btn" onclick="setApiKey()" style="background:#7f8c8d">🔑 API Key</button>

        <button class="t-btn" onclick="voiceCommand()" style="background:#2ecc71">🎙️ Voice</button>

        <button class="t-btn" onclick="openFullScreenPreview()" style="background:#16a085">📱 Full View</button>

        <button class="t-btn" onclick="makeURL()" style="background:#f39c12">🔗 Make URL</button>

        <button class="t-btn" onclick="downloadHTML()" style="background:#27ae60">⬇️ DL HTML</button>

        <button class="t-btn" onclick="exportZip()" style="background:#d35400">📦 ZIP</button>

        <button class="t-btn" onclick="clearEditor()" style="background:#c0392b">🗑️ Clear</button>

        <button class="t-btn" onclick="deleteProject()" style="background:#e74c3c">❌ Del</button>

        <button class="t-btn" onclick="copyCode()" style="background:#2980b9">📋 Copy</button>

        <button class="t-btn" onclick="takeScreenshot()" style="background:#8e44ad">📸 SS Box</button>

        <button class="t-btn" onclick="saveFavoriteVersion()" style="background:#e84393">⭐ Fav Ver</button>

        <button class="t-btn" onclick="geminiAudioReview()" style="background:#3498db">🔊 Audio Review</button>

        <button class="t-btn" onclick="stopAudio()" style="background:#34495e">🛑 Stop Audio</button>

        <button class="t-btn" onclick="pushToGitHub()" style="background:#2c3e50">🐙 GitHub Push</button>

        <button class="t-btn" onclick="autoGitReadme()" style="background:#8e44ad">📝 Auto README</button>

    </div>
<input type="file" id="fileInput" multiple style="display:none" onchange="handleFileUpload(event)">

    <div id="preview-container">

        <button id="close-fs-btn" onclick="closeFullScreen()">❌ क्लोज फुल व्यू</button>

        <iframe id="preview"></iframe>

    </div>

    <textarea id="editor" oninput="updatePreview()" placeholder="कोड यहाँ लिखें..."></textarea>
<script>

        let isThinking = false;

        let fileData = null;

        let projects = JSON.parse(localStorage.getItem('myProjects') || '{"Default": ""}');
        function toggleThinking() { isThinking = !isThinking; document.getElementById('thinkingBtn').innerText = isThinking ? "🧠 Thinking: ON" : "🧠 Thinking: OFF"; }

        function updatePreview() { document.getElementById('preview').srcdoc = document.getElementById('editor').value; }

        function loadProject() { document.getElementById('editor').value = projects[document.getElementById('projectSelect').value] || ""; updatePreview(); }

        function saveProject() { const p = document.getElementById('projectSelect').value; if(p){ projects[p] = document.getElementById('editor').value; localStorage.setItem('myProjects', JSON.stringify(projects)); alert("सेव हो गया!");} }

        function setApiKey() { const oldKey = localStorage.getItem('gemini_api_key') || ""; const k = prompt("Gemini API Key:", oldKey); if(k !== null) localStorage.setItem('gemini_api_key', k.trim()); }

        function updateDropdown() { const s = document.getElementById('projectSelect'); s.innerHTML = '<option value="">- प्रोजेक्ट -</option>'; for(let n in projects) s.innerHTML += `<option value="${n}">${n}</option>`; }

        function deleteProject() { const p = document.getElementById('projectSelect').value; if(p && confirm("डिलीट करें?")){ delete projects[p]; localStorage.setItem('myProjects', JSON.stringify(projects)); updateDropdown(); clearEditor(); } }

        function clearEditor() { document.getElementById('editor').value = ''; updatePreview(); }

        function copyCode() { navigator.clipboard.writeText(document.getElementById('editor').value); alert("कॉपी हो गया!"); }

        function openFullScreenPreview() { document.getElementById('preview-container').classList.add('fullscreen-active'); document.getElementById('close-fs-btn').style.display = 'block'; }

        function closeFullScreen() { document.getElementById('preview-container').classList.remove('fullscreen-active'); document.getElementById('close-fs-btn').style.display = 'none'; }

        function makeURL() { navigator.clipboard.writeText("data:text/html;charset=utf-8," + encodeURIComponent(document.getElementById('editor').value)); alert("URL कॉपी हो गया!"); }

        function downloadHTML() { saveAs(new Blob([document.getElementById('editor').value], {type: 'text/html'}), "index.html"); }

        function exportZip() { let zip = new JSZip(); zip.file("index.html", document.getElementById('editor').value); zip.generateAsync({type:"blob"}).then(c => saveAs(c, "project.zip")); }

        function takeScreenshot() { html2canvas(document.body).then(c => c.toBlob(b => saveAs(b, "screenshot.png"))); }

        function saveFavoriteVersion() { localStorage.setItem("fav_code_version", document.getElementById('editor').value); alert("सेव हो गया!"); }

        function handleFileUpload(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onloadend = () => { fileData = { data: r.result.split(',')[1], mime: f.type }; alert("फाइल लोड हो गई!"); }; r.readAsDataURL(f); }

        

        async function callGemini(p) {

            const k = localStorage.getItem('gemini_api_key');

            if(!k) { alert("API Key सेट करें!"); return null; }

            let parts = [{ text: p }];

            if(fileData) parts.push({ inlineData: { data: fileData.data, mimeType: fileData.mime } });

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${document.getElementById('modelSelect').value}:generateContent?key=${k}`, {

                method: "POST", headers: { "Content-Type": "application/json" },

                body: JSON.stringify({ contents: [{ parts: parts }] })

            });

            const data = await res.json();

            return data.candidates ? data.candidates[0].content.parts[0].text : null;

        }
        async function startStreamingCode() { const res = await callGemini("इस प्रोजेक्ट का कोड लिखें: " + document.getElementById('editor').value); if(res) { document.getElementById('editor').value += "\n" + res; updatePreview(); } }

        async function aiAnalyze() { const res = await callGemini("कोड रिव्यू करें: " + document.getElementById('editor').value); if(res) alert(res); }

        async function geminiAudioReview() { const res = await callGemini("हिंदी में रिव्यू: " + document.getElementById('editor').value); if(res) { const u = new SpeechSynthesisUtterance(res); u.lang='hi-IN'; window.speechSynthesis.speak(u); } }

        function stopAudio() { window.speechSynthesis.cancel(); }

        function voiceCommand() { const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); rec.lang = 'hi-IN'; rec.onresult = async (e) => { const cmd = e.results[0][0].transcript; const res = await callGemini(cmd); if(res) { document.getElementById('editor').value = res; updatePreview(); } }; rec.start(); }

        async function pushToGitHub(c, f) { alert("GitHub पुश फंक्शन..."); }

        async function autoGitReadme() { alert("README तैयार..."); }

        updateDropdown(); updatePreview();

    </script>
<style id="gemini-overlay-styles">

        #gemini-overlay { all: initial; display:none; position:fixed !important; top:0 !important; left:0 !important; width:100vw !important; height:100vh !important; background: linear-gradient(135deg, #f0f4ff 0%, #ffffff 100%) !important; z-index:9999999 !important; pointer-events:auto !important; font-family: sans-serif; }

        .gm-wrapper { display:flex; flex-direction:column; height:100vh; width:100vw; }

        .gm-header { flex: 0 0 50px; display:flex; justify-content:space-between; align-items:center; padding:10px 20px; border-bottom:1px solid #ddd; }

        .gm-chat { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding:20px; color:#333; }

        .gm-input-container { flex: 0 0 auto; padding: 15px; background: rgba(255,255,255,0.8); }

        .gm-action-row { display: flex; gap: 10px; margin-bottom: 10px; }

        .gm-btn-small { background: #fff; border: 1px solid #ccc; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #4285f4; font-size: 18px; }

        .gm-send-btn { background: #4285f4; color: white; border: none; border-radius: 20px; padding: 0 20px; height: 40px; font-weight: bold; cursor: pointer; margin-left: auto; }

        .gm-input-box { width: 100%; height: 45px; background: #fff; border-radius: 25px; display: flex; align-items: center; padding: 0 15px; border: 1px solid #ccc; }

        .gm-input-text { width: 100%; border: none; outline: none; font-size: 16px; }

        .gm-msg-action { margin-top: 8px; display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 8px; }

        .gm-msg-btn { border: none; background: transparent; cursor: pointer; font-size: 14px; color: #555; }

    </style>
    <div id="gemini-overlay">

        <div class="gm-wrapper">

            <div class="gm-header">

                <button onclick="document.getElementById('gemini-overlay').style.display='none'" style="border:none; background:transparent; font-size:18px;">⬅️</button>

                <span style="font-weight:bold; color:#4285f4; font-size:18px;">Gemini</span>

                <button onclick="document.getElementById('gm-chat-area').innerHTML=''" style="border:none; background:transparent; font-size:18px;">🗑️</button>

            </div>

            <div id="gm-chat-area" class="gm-chat"></div>

            <div class="gm-input-container">

                <div class="gm-action-row">

                    <input type="file" id="gm-file-input" style="display:none">

                    <button onclick="document.getElementById('gm-file-input').click()" class="gm-btn-small">+</button>

                    <button onclick="startVoiceOverlay()" class="gm-btn-small">🎙️</button>

                    <button onclick="window.sendOverlayMsg()" class="gm-send-btn">➤ भेजें</button>

                </div>

                <div class="gm-input-box">

                    <input type="text" id="gm-input" class="gm-input-text" placeholder="Gemini से पूछें...">

                </div>

            </div>

        </div>

    </div>
<script id="gemini-overlay-script">

        // बटन की वर्किंग के लिए window के साथ फिक्स किया गया है

        window.sendOverlayMsg = async function() {

            const input = document.getElementById('gm-input');

            const userText = input.value.trim();

            if(!userText) return;

            

            const chat = document.getElementById('gm-chat-area');

            chat.innerHTML += `<div style="display: flex; justify-content: flex-end; margin-bottom: 15px;"><div style="padding: 10px; background: #e8f0fe; border-radius: 10px; color: #1a73e8; font-size: 14px; max-width: 80%;">${userText}</div></div>`;

            input.value = '';

            chat.scrollTop = chat.scrollHeight;
            const res = await window.callGemini(userText);

            if(!res) return;
            chat.innerHTML += `<div style="display: flex; justify-content: flex-start; margin-bottom: 15px;"><div style="padding: 10px; background: #f1f3f4; border-radius: 10px; color: #333; font-size: 14px; max-width: 80%;">${res}</div></div>`;

            chat.scrollTop = chat.scrollHeight;

        };

        

        function startVoiceOverlay() {

            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

            rec.lang = 'hi-IN';

            rec.onresult = (e) => { document.getElementById('gm-input').value = e.results[0][0].transcript; };

            rec.start();

        }

    </script>
</body>
</html>
